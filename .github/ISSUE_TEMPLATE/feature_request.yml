name: Feature request
description: Suggest an improvement to the site or repository
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Search [existing issues](https://github.com/4legssoftware/profound-book-club/issues)
        first. For large changes, open an issue before starting a pull request.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What is missing or awkward today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to see instead?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false

  - type: checkboxes
    id: volunteer
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this if maintainers agree with the approach
          required: false
