name: Main

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 15 * * 4'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Check Prettier formatting
        run: pnpm run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  cdk-test:
    name: CDK Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: infrastructure/pnpm-lock.yaml

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: pnpm install --frozen-lockfile

      - name: Run CDK tests
        working-directory: infrastructure
        run: pnpm run test

  deploy-infrastructure-stage:
    name: Deploy Infrastructure (Stage)
    runs-on: ubuntu-latest
    needs: [lint, build, cdk-test]
    outputs:
      website_url: ${{ steps.deploy.outputs.website_url }}
      bucket_name: ${{ steps.deploy.outputs.bucket_name }}
      distribution_id: ${{ steps.deploy.outputs.distribution_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: infrastructure/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd infrastructure && pnpm install --frozen-lockfile

      - name: Build infrastructure
        run: cd infrastructure && pnpm run build

      - name: Configure AWS credentials for Stage
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b #v6.2.0
        with:
          role-to-assume: arn:aws:iam::883353268059:role/gha-deploy-stage
          aws-region: us-east-2

      - name: Bootstrap CDK
        run: cd infrastructure && pnpm cdk bootstrap aws://883353268059/us-east-2 --require-approval never

      - name: Deploy CDK stack to Stage
        id: deploy
        run: |
          cd infrastructure
          pnpm cdk deploy --require-approval never

          STACK_NAME="ProfoundBookClubStack"
          WEBSITE_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`WebsiteURL`].OutputValue' \
            --output text 2>/dev/null || echo '')
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text 2>/dev/null || echo '')
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text 2>/dev/null || echo '')

          echo "website_url=$WEBSITE_URL" >> $GITHUB_OUTPUT
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
        env:
          ENVIRONMENT: stage
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN_STAGE }}

  deploy-application-stage:
    name: Deploy Application (Stage)
    runs-on: ubuntu-latest
    needs: [lint, build, deploy-infrastructure-stage]
    outputs:
      invalidation_id: ${{ steps.invalidation.outputs.invalidation_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials for Stage
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b #v6.2.0
        with:
          role-to-assume: arn:aws:iam::883353268059:role/gha-deploy-stage
          aws-region: us-east-2

      - name: Get deployment parameters from stack outputs
        id: params
        run: |
          BUCKET_NAME="${{ needs.deploy-infrastructure-stage.outputs.bucket_name }}"
          DIST_ID="${{ needs.deploy-infrastructure-stage.outputs.distribution_id }}"
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ steps.params.outputs.bucket_name }}/ --delete

      - name: Invalidate CloudFront cache
        id: invalidation
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ steps.params.outputs.distribution_id }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_OUTPUT
          echo "Invalidation ID: $INVALIDATION_ID"

  smoke-tests-stage:
    name: Smoke Tests (Stage)
    runs-on: ubuntu-latest
    needs: [deploy-application-stage, deploy-infrastructure-stage]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        run: pnpm run smoke-test
        env:
          ENVIRONMENT: stage
          SITE_URL: ${{ needs.deploy-infrastructure-stage.outputs.website_url }}
          AWS_REGION: us-east-2

  deploy-infrastructure-prod:
    name: Deploy Infrastructure (Prod)
    runs-on: ubuntu-latest
    needs: [deploy-application-stage, smoke-tests-stage]
    outputs:
      website_url: ${{ steps.deploy.outputs.website_url }}
      bucket_name: ${{ steps.deploy.outputs.bucket_name }}
      distribution_id: ${{ steps.deploy.outputs.distribution_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: infrastructure/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd infrastructure && pnpm install --frozen-lockfile

      - name: Build infrastructure
        run: cd infrastructure && pnpm run build

      - name: Configure AWS credentials for Prod
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b #v6.2.0
        with:
          role-to-assume: arn:aws:iam::727508844146:role/gha-deploy-prod
          aws-region: us-east-2

      - name: Bootstrap CDK
        run: cd infrastructure && pnpm cdk bootstrap aws://727508844146/us-east-2 --require-approval never

      - name: Deploy CDK stack to Prod
        id: deploy
        run: |
          cd infrastructure
          pnpm cdk deploy --require-approval never

          STACK_NAME="ProfoundBookClubStack"
          WEBSITE_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`WebsiteURL`].OutputValue' \
            --output text 2>/dev/null || echo '')
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text 2>/dev/null || echo '')
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text 2>/dev/null || echo '')

          echo "website_url=$WEBSITE_URL" >> $GITHUB_OUTPUT
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
        env:
          ENVIRONMENT: prod
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN_PROD }}

  deploy-application-prod:
    name: Deploy Application (Prod)
    runs-on: ubuntu-latest
    needs: [deploy-application-stage, deploy-infrastructure-prod]
    outputs:
      invalidation_id: ${{ steps.invalidation.outputs.invalidation_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials for Prod
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b #v6.2.0
        with:
          role-to-assume: arn:aws:iam::727508844146:role/gha-deploy-prod
          aws-region: us-east-2

      - name: Get deployment parameters from stack outputs
        id: params
        run: |
          BUCKET_NAME="${{ needs.deploy-infrastructure-prod.outputs.bucket_name }}"
          DIST_ID="${{ needs.deploy-infrastructure-prod.outputs.distribution_id }}"
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ steps.params.outputs.bucket_name }}/ --delete

      - name: Invalidate CloudFront cache
        id: invalidation
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ steps.params.outputs.distribution_id }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_OUTPUT
          echo "Invalidation ID: $INVALIDATION_ID"

  smoke-tests-prod:
    name: Smoke Tests (Prod)
    runs-on: ubuntu-latest
    needs: [deploy-application-prod, deploy-infrastructure-prod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 #v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        run: pnpm run smoke-test
        env:
          ENVIRONMENT: prod
          SITE_URL: ${{ needs.deploy-infrastructure-prod.outputs.website_url }}
          AWS_REGION: us-east-2

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      [
        deploy-infrastructure-stage,
        deploy-application-stage,
        smoke-tests-stage,
        deploy-infrastructure-prod,
        deploy-application-prod,
        smoke-tests-prod,
      ]
    if: always()
    steps:
      - name: Generate deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-infrastructure-stage.result }}" == "success" ]; then
            echo "### ✅ Stage Infrastructure" >> $GITHUB_STEP_SUMMARY
            echo "- **Website URL:** ${{ needs.deploy-infrastructure-stage.outputs.website_url }}" >> $GITHUB_STEP_SUMMARY
            echo "- **S3 Bucket:** ${{ needs.deploy-infrastructure-stage.outputs.bucket_name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **CloudFront Distribution:** ${{ needs.deploy-infrastructure-stage.outputs.distribution_id }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-application-stage.result }}" == "success" ]; then
            echo "### ✅ Stage Application" >> $GITHUB_STEP_SUMMARY
            echo "- **CloudFront Invalidation:** ${{ needs.deploy-application-stage.outputs.invalidation_id }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.smoke-tests-stage.result }}" == "success" ]; then
            echo "### ✅ Smoke Tests (Stage)" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** All tests passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.smoke-tests-stage.result }}" == "failure" ]; then
            echo "### ❌ Smoke Tests (Stage)" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** Tests failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-infrastructure-prod.result }}" == "success" ]; then
            echo "### ✅ Prod Infrastructure" >> $GITHUB_STEP_SUMMARY
            echo "- **Website URL:** ${{ needs.deploy-infrastructure-prod.outputs.website_url }}" >> $GITHUB_STEP_SUMMARY
            echo "- **S3 Bucket:** ${{ needs.deploy-infrastructure-prod.outputs.bucket_name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **CloudFront Distribution:** ${{ needs.deploy-infrastructure-prod.outputs.distribution_id }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-application-prod.result }}" == "success" ]; then
            echo "### ✅ Prod Application" >> $GITHUB_STEP_SUMMARY
            echo "- **CloudFront Invalidation:** ${{ needs.deploy-application-prod.outputs.invalidation_id }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.smoke-tests-prod.result }}" == "success" ]; then
            echo "### ✅ Smoke Tests (Prod)" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** All tests passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.smoke-tests-prod.result }}" == "failure" ]; then
            echo "### ❌ Smoke Tests (Prod)" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** Tests failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        build,
        cdk-test,
        deploy-infrastructure-stage,
        deploy-application-stage,
        smoke-tests-stage,
        deploy-infrastructure-prod,
        deploy-application-prod,
        smoke-tests-prod,
      ]
    if: always()
    steps:
      - name: Determine workflow status
        id: status
        run: |
          LINT_RESULT="${{ needs.lint.result }}"
          BUILD_RESULT="${{ needs.build.result }}"
          CDK_TEST_RESULT="${{ needs.cdk-test.result }}"
          INFRA_STAGE_RESULT="${{ needs.deploy-infrastructure-stage.result }}"
          APP_STAGE_RESULT="${{ needs.deploy-application-stage.result }}"
          SMOKE_STAGE_RESULT="${{ needs.smoke-tests-stage.result }}"
          INFRA_PROD_RESULT="${{ needs.deploy-infrastructure-prod.result }}"
          APP_PROD_RESULT="${{ needs.deploy-application-prod.result }}"
          SMOKE_PROD_RESULT="${{ needs.smoke-tests-prod.result }}"

          FAILED_JOBS=""
          [ "$LINT_RESULT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}lint, "
          [ "$BUILD_RESULT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}build, "
          [ "$CDK_TEST_RESULT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}cdk-test, "
          [ "$INFRA_STAGE_RESULT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}deploy-infrastructure-stage, "
          [ "$APP_STAGE_RESULT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}deploy-application-stage, "
          [ "$SMOKE_STAGE_RESULT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}smoke-tests-stage, "
          [ "$INFRA_PROD_RESULT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}deploy-infrastructure-prod, "
          [ "$APP_PROD_RESULT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}deploy-application-prod, "
          [ "$SMOKE_PROD_RESULT" != "success" ] && FAILED_JOBS="${FAILED_JOBS}smoke-tests-prod, "

          FAILED_JOBS="${FAILED_JOBS%, }"

          if [ -n "$FAILED_JOBS" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "title=:x: profound-book-club Main Failed" >> $GITHUB_OUTPUT
            echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "title=:white_check_mark: profound-book-club Main Passed" >> $GITHUB_OUTPUT
            echo "failed_jobs=" >> $GITHUB_OUTPUT
          fi

          COMMIT_URL="<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
          WORKFLOW_URL="<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
          echo "commit_url=$COMMIT_URL" >> $GITHUB_OUTPUT
          echo "workflow_url=$WORKFLOW_URL" >> $GITHUB_OUTPUT

          SMOKE_STAGE_RESULT="${{ needs.smoke-tests-stage.result }}"
          if [ "$SMOKE_STAGE_RESULT" == "success" ]; then
            SMOKE_STAGE_STATUS="✅"
          elif [ "$SMOKE_STAGE_RESULT" == "skipped" ]; then
            SMOKE_STAGE_STATUS="⏭️"
          else
            SMOKE_STAGE_STATUS="❌"
          fi
          echo "smoke_stage_status=$SMOKE_STAGE_STATUS" >> $GITHUB_OUTPUT

          SMOKE_PROD_RESULT="${{ needs.smoke-tests-prod.result }}"
          if [ "$SMOKE_PROD_RESULT" == "success" ]; then
            SMOKE_PROD_STATUS="✅"
          elif [ "$SMOKE_PROD_RESULT" == "skipped" ]; then
            SMOKE_PROD_STATUS="⏭️"
          else
            SMOKE_PROD_STATUS="❌"
          fi
          echo "smoke_prod_status=$SMOKE_PROD_STATUS" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "title": "${{ steps.status.outputs.title }}",
                  "fields": [
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.ref_name }}",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "${{ steps.status.outputs.commit_url }}",
                      "short": true
                    },
                    {
                      "title": "Workflow",
                      "value": "${{ steps.status.outputs.workflow_url }}",
                      "short": true
                    },
                    {
                      "title": "${{ steps.status.outputs.failed_jobs != '' && 'Failed Jobs' || 'Status' }}",
                      "value": "${{ steps.status.outputs.failed_jobs != '' && steps.status.outputs.failed_jobs || 'All jobs passed' }}",
                      "short": false
                    },
                    {
                      "title": "Smoke Tests",
                      "value": "Stage: ${{ steps.status.outputs.smoke_stage_status }} | Prod: ${{ steps.status.outputs.smoke_prod_status }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
